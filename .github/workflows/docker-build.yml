name: Build and Push Docker Image to Azure ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Build and Push to ACR
      uses: azure/acr-build@v1
      with:
        service_principal: ${{ secrets.SERVICE_PRINCIPAL_ID }}
        service_principal_password: ${{ secrets.SERVICE_PRINCIPAL_PASSWORD }}
        tenant: ${{ secrets.AZURE_TENANT_ID }}
        registry: retailfixitacrd5rteg4o2kv5q
        repository: retailfixit-api
        image: latest
        folder: backend/src/RetailFixIt.Api
        dockerfile: Dockerfile
        
    - name: Update Container App
      uses: azure/container-apps-deploy-action@v2
      with:
        appSourcePath: backend/src/RetailFixIt.Api
        acrName: retailfixitacrd5rteg4o2kv5q
        containerAppName: api-retailfixit-dev
        resourceGroup: rg-retailfixit-dev
        imageToDeploy: retailfixitacrd5rteg4o2kv5q.azurecr.io/retailfixit-api:latest
